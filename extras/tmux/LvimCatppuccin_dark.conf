set -g mode-style "fg=#181825,bg=#d4834f"

set -g message-style "fg=#66baac,bg=#11111b"

set -g status-style "fg=#5082d4,bg=#11111b"

setw -g window-status-style "fg=#84c27f,bold,bg=#11111b"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#181825,bold,bg=#84c27f"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#d4834f"

setw -g pane-border-style "fg=#71b96b"
setw -g pane-active-border-style "fg=#71b96b"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#84c27f,bold,fg=#181825] #S #[default]"
wg_user_host="#[bg=#11111b,bold,fg=#d36d89] #(whoami)@#H"
wg_is_zoomed="#[fg=#11111b,bg=#d36d89]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#181825,bg=#d36d89]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#84c27f,bold,fg=#181825] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#84c27f]●#[default]"
set -g @offline_icon "#[fg=#cc5777]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#84c27f"
set -g @sysstat_cpu_color_medium "#da9366"
set -g @sysstat_cpu_color_stress "#cc5777"

set -g @sysstat_mem_color_low "#84c27f"
set -g @sysstat_mem_color_medium "#da9366"
set -g @sysstat_mem_color_stress "#cc5777"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#d36d89,bold"
set -g @prefix_highlight_bg "#181825"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#d36d89,bold,bg=#11111b"
