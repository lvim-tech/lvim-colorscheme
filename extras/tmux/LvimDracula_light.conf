set -g mode-style "fg=#dfdfdf,bg=#ae7435"

set -g message-style "fg=#307f90,bg=#dadada"

set -g status-style "fg=#307f90,bg=#dadada"

setw -g window-status-style "fg=#2f7a42,bold,bg=#dadada"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#dfdfdf,bold,bg=#2f7a42"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#ae7435"

setw -g pane-border-style "fg=#25803c"
setw -g pane-active-border-style "fg=#25803c"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#2f7a42,bold,fg=#dfdfdf] #S #[default]"
wg_user_host="#[bg=#dadada,bold,fg=#ba4040] #(whoami)@#H"
wg_is_zoomed="#[fg=#dadada,bg=#ba4040]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#dfdfdf,bg=#ba4040]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#2f7a42,bold,fg=#dfdfdf] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#2f7a42]●#[default]"
set -g @offline_icon "#[fg=#d63f3f]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#2f7a42"
set -g @sysstat_cpu_color_medium "#9e703f"
set -g @sysstat_cpu_color_stress "#d63f3f"

set -g @sysstat_mem_color_low "#2f7a42"
set -g @sysstat_mem_color_medium "#9e703f"
set -g @sysstat_mem_color_stress "#d63f3f"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#ba4040,bold"
set -g @prefix_highlight_bg "#dfdfdf"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#ba4040,bold,bg=#dadada"
