set -g mode-style "fg=#dfdfdf,bg=#bf7546"

set -g message-style "fg=#47847a,bg=#dadada"

set -g status-style "fg=#416cb1,bg=#dadada"

setw -g window-status-style "fg=#557f51,bold,bg=#dadada"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#dfdfdf,bold,bg=#557f51"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#bf7546"

setw -g pane-border-style "fg=#52884d"
setw -g pane-active-border-style "fg=#52884d"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#557f51,bold,fg=#dfdfdf] #S #[default]"
wg_user_host="#[bg=#dadada,bold,fg=#9d445e] #(whoami)@#H"
wg_is_zoomed="#[fg=#dadada,bg=#9d445e]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#dfdfdf,bg=#9d445e]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#557f51,bold,fg=#dfdfdf] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#557f51]●#[default]"
set -g @offline_icon "#[fg=#b54c69]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#557f51"
set -g @sysstat_cpu_color_medium "#aa724e"
set -g @sysstat_cpu_color_stress "#b54c69"

set -g @sysstat_mem_color_low "#557f51"
set -g @sysstat_mem_color_medium "#aa724e"
set -g @sysstat_mem_color_stress "#b54c69"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#9d445e,bold"
set -g @prefix_highlight_bg "#dfdfdf"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#9d445e,bold,bg=#dadada"
