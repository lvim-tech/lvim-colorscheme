set -g mode-style "fg=#dfdfdf,bg=#bc7843"

set -g message-style "fg=#498789,bg=#dadada"

set -g status-style "fg=#4f6e97,bg=#dadada"

setw -g window-status-style "fg=#6b8578,bold,bg=#dadada"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#dfdfdf,bold,bg=#6b8578"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#bc7843"

setw -g pane-border-style "fg=#6d8f7f"
setw -g pane-active-border-style "fg=#6d8f7f"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#6b8578,bold,fg=#dfdfdf] #S #[default]"
wg_user_host="#[bg=#dadada,bold,fg=#a65c6e] #(whoami)@#H"
wg_is_zoomed="#[fg=#dadada,bg=#a65c6e]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#dfdfdf,bg=#a65c6e]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#6b8578,bold,fg=#dfdfdf] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#6b8578]●#[default]"
set -g @offline_icon "#[fg=#c35f78]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#6b8578"
set -g @sysstat_cpu_color_medium "#a9754b"
set -g @sysstat_cpu_color_stress "#c35f78"

set -g @sysstat_mem_color_low "#6b8578"
set -g @sysstat_mem_color_medium "#a9754b"
set -g @sysstat_mem_color_stress "#c35f78"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#a65c6e,bold"
set -g @prefix_highlight_bg "#dfdfdf"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#a65c6e,bold,bg=#dadada"
