set -g mode-style "fg=#101015,bg=#d87b43"

set -g message-style "fg=#31927e,bg=#0d0d11"

set -g status-style "fg=#4e78d1,bg=#0d0d11"

setw -g window-status-style "fg=#9dbd7b,bold,bg=#0d0d11"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#101015,bold,bg=#9dbd7b"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#d87b43"

setw -g pane-border-style "fg=#8fb468"
setw -g pane-active-border-style "fg=#8fb468"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#9dbd7b,bold,fg=#101015] #S #[default]"
wg_user_host="#[bg=#0d0d11,bold,fg=#d76479] #(whoami)@#H"
wg_is_zoomed="#[fg=#0d0d11,bg=#d76479]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#101015,bg=#d76479]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#9dbd7b,bold,fg=#101015] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#9dbd7b]●#[default]"
set -g @offline_icon "#[fg=#d14d66]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#9dbd7b"
set -g @sysstat_cpu_color_medium "#dd8b5a"
set -g @sysstat_cpu_color_stress "#d14d66"

set -g @sysstat_mem_color_low "#9dbd7b"
set -g @sysstat_mem_color_medium "#dd8b5a"
set -g @sysstat_mem_color_stress "#d14d66"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#d76479,bold"
set -g @prefix_highlight_bg "#101015"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#d76479,bold,bg=#0d0d11"
