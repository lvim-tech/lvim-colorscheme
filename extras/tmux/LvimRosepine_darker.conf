set -g mode-style "fg=#191724,bg=#bd7370"

set -g message-style "fg=#3b6374,bg=#0a0910"

set -g status-style "fg=#3b6374,bg=#0a0910"

setw -g window-status-style "fg=#83b2ba,bold,bg=#0a0910"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#191724,bold,bg=#83b2ba"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#bd7370"

setw -g pane-border-style "fg=#71a7b0"
setw -g pane-active-border-style "fg=#71a7b0"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#83b2ba,bold,fg=#191724] #S #[default]"
wg_user_host="#[bg=#0a0910,bold,fg=#cd6985] #(whoami)@#H"
wg_is_zoomed="#[fg=#0a0910,bg=#cd6985]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#191724,bg=#cd6985]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#83b2ba,bold,fg=#191724] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#83b2ba]●#[default]"
set -g @offline_icon "#[fg=#c65474]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#83b2ba"
set -g @sysstat_cpu_color_medium "#c68784"
set -g @sysstat_cpu_color_stress "#c65474"

set -g @sysstat_mem_color_low "#83b2ba"
set -g @sysstat_mem_color_medium "#c68784"
set -g @sysstat_mem_color_stress "#c65474"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#cd6985,bold"
set -g @prefix_highlight_bg "#191724"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#cd6985,bold,bg=#0a0910"
