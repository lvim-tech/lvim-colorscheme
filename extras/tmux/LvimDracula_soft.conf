set -g mode-style "fg=#252630,bg=#d99144"

set -g message-style "fg=#4dc0d8,bg=#20222b"

set -g status-style "fg=#4dc0d8,bg=#20222b"

setw -g window-status-style "fg=#58d879,bold,bg=#20222b"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#252630,bold,bg=#58d879"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#d99144"

setw -g pane-border-style "fg=#42d367"
setw -g pane-active-border-style "fg=#42d367"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#58d879,bold,fg=#252630] #S #[default]"
wg_user_host="#[bg=#20222b,bold,fg=#dd5757] #(whoami)@#H"
wg_is_zoomed="#[fg=#20222b,bg=#dd5757]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#252630,bg=#dd5757]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#58d879,bold,fg=#252630] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#58d879]●#[default]"
set -g @offline_icon "#[fg=#d84040]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#58d879"
set -g @sysstat_cpu_color_medium "#de9f5c"
set -g @sysstat_cpu_color_stress "#d84040"

set -g @sysstat_mem_color_low "#58d879"
set -g @sysstat_mem_color_medium "#de9f5c"
set -g @sysstat_mem_color_stress "#d84040"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#dd5757,bold"
set -g @prefix_highlight_bg "#252630"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#dd5757,bold,bg=#20222b"
