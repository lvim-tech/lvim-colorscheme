set -g mode-style "fg=#232e33,bg=#d1694b"

set -g message-style "fg=#43d8b5,bg=#1f282d"

set -g status-style "fg=#4978da,bg=#1f282d"

setw -g window-status-style "fg=#a6c974,bold,bg=#1f282d"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#232e33,bold,bg=#a6c974"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#d1694b"

setw -g pane-border-style "fg=#99c15f"
setw -g pane-active-border-style "fg=#99c15f"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#a6c974,bold,fg=#232e33] #S #[default]"
wg_user_host="#[bg=#1f282d,bold,fg=#d1676c] #(whoami)@#H"
wg_is_zoomed="#[fg=#1f282d,bg=#d1676c]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#232e33,bg=#d1676c]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#a6c974,bold,fg=#232e33] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#a6c974]●#[default]"
set -g @offline_icon "#[fg=#ca5157]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#a6c974"
set -g @sysstat_cpu_color_medium "#d77c61"
set -g @sysstat_cpu_color_stress "#ca5157"

set -g @sysstat_mem_color_low "#a6c974"
set -g @sysstat_mem_color_medium "#d77c61"
set -g @sysstat_mem_color_stress "#ca5157"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#d1676c,bold"
set -g @prefix_highlight_bg "#232e33"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#d1676c,bold,bg=#1f282d"
