set -g mode-style "fg=#dfdfdf,bg=#cb733e"

set -g message-style "fg=#277767,bg=#dadada"

set -g status-style "fg=#4971c5,bg=#dadada"

setw -g window-status-style "fg=#667b4f,bold,bg=#dadada"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#dfdfdf,bold,bg=#667b4f"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#cb733e"

setw -g pane-border-style "fg=#68844b"
setw -g pane-active-border-style "fg=#68844b"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#667b4f,bold,fg=#dfdfdf] #S #[default]"
wg_user_host="#[bg=#dadada,bold,fg=#a94357] #(whoami)@#H"
wg_is_zoomed="#[fg=#dadada,bg=#a94357]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#dfdfdf,bg=#a94357]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#667b4f,bold,fg=#dfdfdf] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#667b4f]●#[default]"
set -g @offline_icon "#[fg=#c4485f]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#667b4f"
set -g @sysstat_cpu_color_medium "#b57148"
set -g @sysstat_cpu_color_stress "#c4485f"

set -g @sysstat_mem_color_low "#667b4f"
set -g @sysstat_mem_color_medium "#b57148"
set -g @sysstat_mem_color_stress "#c4485f"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#a94357,bold"
set -g @prefix_highlight_bg "#dfdfdf"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#a94357,bold,bg=#dadada"
