set -g mode-style "fg=#1e242c,bg=#b17562"

set -g message-style "fg=#789f9d,bg=#1a1e25"

set -g status-style "fg=#6f89a4,bg=#1a1e25"

setw -g window-status-style "fg=#97ab86,bold,bg=#1a1e25"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#1e242c,bold,bg=#97ab86"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#b17562"

setw -g pane-border-style "fg=#89a076"
setw -g pane-active-border-style "fg=#89a076"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#97ab86,bold,fg=#1e242c] #S #[default]"
wg_user_host="#[bg=#1a1e25,bold,fg=#af7177] #(whoami)@#H"
wg_is_zoomed="#[fg=#1a1e25,bg=#af7177]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#1e242c,bg=#af7177]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#97ab86,bold,fg=#1e242c] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#97ab86]●#[default]"
set -g @offline_icon "#[fg=#a66067]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#97ab86"
set -g @sysstat_cpu_color_medium "#ba8574"
set -g @sysstat_cpu_color_stress "#a66067"

set -g @sysstat_mem_color_low "#97ab86"
set -g @sysstat_mem_color_medium "#ba8574"
set -g @sysstat_mem_color_stress "#a66067"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#af7177,bold"
set -g @prefix_highlight_bg "#1e242c"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#af7177,bold,bg=#1a1e25"
