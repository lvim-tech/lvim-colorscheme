set -g mode-style "fg=#00242e,bg=#9d5030"

set -g message-style "fg=#38807b,bg=#001f27"

set -g status-style "fg=#3d7aa5,bg=#001f27"

setw -g window-status-style "fg=#727f1a,bold,bg=#001f27"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#00242e,bold,bg=#727f1a"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#9d5030"

setw -g pane-border-style "fg=#687418"
setw -g pane-active-border-style "fg=#687418"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#727f1a,bold,fg=#00242e] #S #[default]"
wg_user_host="#[bg=#001f27,bold,fg=#bf4e4c] #(whoami)@#H"
wg_is_zoomed="#[fg=#001f27,bg=#bf4e4c]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#00242e,bg=#bf4e4c]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#727f1a,bold,fg=#00242e] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#727f1a]●#[default]"
set -g @offline_icon "#[fg=#b34240]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#727f1a"
set -g @sysstat_cpu_color_medium "#ac5835"
set -g @sysstat_cpu_color_stress "#b34240"

set -g @sysstat_mem_color_low "#727f1a"
set -g @sysstat_mem_color_medium "#ac5835"
set -g @sysstat_mem_color_stress "#b34240"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#bf4e4c,bold"
set -g @prefix_highlight_bg "#00242e"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#bf4e4c,bold,bg=#001f27"
