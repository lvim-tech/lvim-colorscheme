set -g mode-style "fg=#dfdfdf,bg=#d26d43"

set -g message-style "fg=#3a8580,bg=#dadada"

set -g status-style "fg=#407fac,bg=#dadada"

setw -g window-status-style "fg=#707c19,bold,bg=#dadada"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#dfdfdf,bold,bg=#707c19"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#d26d43"

setw -g pane-border-style "fg=#7a881e"
setw -g pane-active-border-style "fg=#7a881e"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#707c19,bold,fg=#dfdfdf] #S #[default]"
wg_user_host="#[bg=#dadada,bold,fg=#cc5452] #(whoami)@#H"
wg_is_zoomed="#[fg=#dadada,bg=#cc5452]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#dfdfdf,bg=#cc5452]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#707c19,bold,fg=#dfdfdf] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#707c19]●#[default]"
set -g @offline_icon "#[fg=#dc5d5b]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#707c19"
set -g @sysstat_cpu_color_medium "#c3643d"
set -g @sysstat_cpu_color_stress "#dc5d5b"

set -g @sysstat_mem_color_low "#707c19"
set -g @sysstat_mem_color_medium "#c3643d"
set -g @sysstat_mem_color_stress "#dc5d5b"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#cc5452,bold"
set -g @prefix_highlight_bg "#dfdfdf"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#cc5452,bold,bg=#dadada"
