set -g mode-style "fg=#dfdfdf,bg=#a05e33"

set -g message-style "fg=#479e8d,bg=#dadada"

set -g status-style "fg=#5b97b6,bg=#dadada"

setw -g window-status-style "fg=#7b7e3d,bold,bg=#dadada"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#dfdfdf,bold,bg=#7b7e3d"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#a05e33"

setw -g pane-border-style "fg=#8a8e46"
setw -g pane-active-border-style "fg=#8a8e46"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#7b7e3d,bold,fg=#dfdfdf] #S #[default]"
wg_user_host="#[bg=#dadada,bold,fg=#c74d4d] #(whoami)@#H"
wg_is_zoomed="#[fg=#dadada,bg=#c74d4d]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#dfdfdf,bg=#c74d4d]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#7b7e3d,bold,fg=#dfdfdf] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#7b7e3d]●#[default]"
set -g @offline_icon "#[fg=#e44a4a]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#7b7e3d"
set -g @sysstat_cpu_color_medium "#8d522b"
set -g @sysstat_cpu_color_stress "#e44a4a"

set -g @sysstat_mem_color_low "#7b7e3d"
set -g @sysstat_mem_color_medium "#8d522b"
set -g @sysstat_mem_color_stress "#e44a4a"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#c74d4d,bold"
set -g @prefix_highlight_bg "#dfdfdf"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#c74d4d,bold,bg=#dadada"
