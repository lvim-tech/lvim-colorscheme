set -g mode-style "fg=#dfdfdf,bg=#945654"

set -g message-style "fg=#5e99b2,bg=#dadada"

set -g status-style "fg=#5e99b2,bg=#dadada"

setw -g window-status-style "fg=#5d8086,bold,bg=#dadada"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#dfdfdf,bold,bg=#5d8086"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#945654"

setw -g pane-border-style "fg=#5c8991"
setw -g pane-active-border-style "fg=#5c8991"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#5d8086,bold,fg=#dfdfdf] #S #[default]"
wg_user_host="#[bg=#dadada,bold,fg=#a04a63] #(whoami)@#H"
wg_is_zoomed="#[fg=#dadada,bg=#a04a63]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#dfdfdf,bg=#a04a63]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#5d8086,bold,fg=#dfdfdf] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#5d8086]●#[default]"
set -g @offline_icon "#[fg=#bb4f6d]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#5d8086"
set -g @sysstat_cpu_color_medium "#c0716d"
set -g @sysstat_cpu_color_stress "#bb4f6d"

set -g @sysstat_mem_color_low "#5d8086"
set -g @sysstat_mem_color_medium "#c0716d"
set -g @sysstat_mem_color_stress "#bb4f6d"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#a04a63,bold"
set -g @prefix_highlight_bg "#dfdfdf"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#a04a63,bold,bg=#dadada"
