set -g mode-style "fg=#10161e,bg=#ce844a"

set -g message-style "fg=#62b2b4,bg=#0e131a"

set -g status-style "fg=#5f84b4,bg=#0e131a"

setw -g window-status-style "fg=#89aa9a,bold,bg=#0e131a"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#10161e,bold,bg=#89aa9a"
setw -g window-status-current-format " #I:#W "

setw -g window-status-activity-style "fg=#ce844a"

setw -g pane-border-style "fg=#799e8c"
setw -g pane-active-border-style "fg=#799e8c"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[bg=#89aa9a,bold,fg=#10161e] #S #[default]"
wg_user_host="#[bg=#0e131a,bold,fg=#b46478] #(whoami)@#H"
wg_is_zoomed="#[fg=#0e131a,bg=#b46478]#{?window_zoomed_flag, ZOOM ,}#[default]"
wg_is_keys_off="#[fg=#10161e,bg=#b46478]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' KEYS OFF ')#[default]"
wg_date="#[bg=#89aa9a,bold,fg=#10161e] %h %d %H:%M #[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} $wg_user_host #{online_status} $wg_date"

set -g @online_icon "#[fg=#89aa9a]●#[default]"
set -g @offline_icon "#[fg=#ac5369]●#[default]"

set -g @sysstat_mem_view_tmpl 'MEM:#[fg=#{mem.color}]#{mem.pused}#[default] #{mem.used}'

set -g @sysstat_cpu_color_low "#89aa9a"
set -g @sysstat_cpu_color_medium "#d49360"
set -g @sysstat_cpu_color_stress "#ac5369"

set -g @sysstat_mem_color_low "#89aa9a"
set -g @sysstat_mem_color_medium "#d49360"
set -g @sysstat_mem_color_stress "#ac5369"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "#b46478,bold"
set -g @prefix_highlight_bg "#10161e"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#b46478,bold,bg=#0e131a"
