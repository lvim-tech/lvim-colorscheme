"$schema" = "https://starship.rs/config-schema.json"

add_newline = true

format = "$all$username$time$character"

[memory_usage]
format = "[у°Қӣ ${ram}]($style) "
disabled = false
threshold = -1
symbol = "у°Қӣ "
style = "bold #42778a"

[time]
format = "[$time]($style) "
time_format = "%T"
style = "bold #628680"
disabled = false

[username]
format = "[п‘„](#7b6943) [$user]($style) "
disabled = false
show_always = true
style_user = "#6d7f55 bold"
style_root = "#d15e5e bold"

[character]
success_symbol = "[п„  ](bold #6d7f55)"
error_symbol = "[п„  ](bold #d15e5e)"
vimcmd_replace_one_symbol = "[п„  ](bold ${orange_dark_dark})"
vimcmd_replace_symbol = "[п„  ](bold #ab7b4b)"
vimcmd_symbol = "[п„  ](bold dimmed #6d7f55)"
vimcmd_visual_symbol = "[п„  ](bold dimmed #6d7f55)"

[directory]
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "пҖ• вҖҰ/"
home_symbol = "пҖ• "
style = "bold #867d9d"
read_only_style = "bold #d15e5e"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = "пҗҳ "
style = "bold #7b6943"

[git_commit]
format = '[пҗ— $hash$tag]($style) '
commit_hash_length = 7
style = "bold #9b5652"

[git_status]
format = '([п‘„](#7b6943) [$all_status$ahead_behind]($style)[п‘„](#7b6943) )'
ahead = "пҒў "
behind = "пҒЈ "
diverged = "пҒ№ "
untracked = "п„Ё "
stashed = "пҒ© "
modified = "пҒҖ "
staged = "пҒҶ "
conflicted = "пҒұ "

[hostname]
ssh_only = true
style = "bold dimmed #6d7f55"

[jobs]
symbol = "вңҰ "
style = "bold #688bcb"

[line_break]
disabled = false

[cmd_duration]
format = '[$duration]($style)'
min_time = 500
show_milliseconds = true
style = "bold #d15e5e"

