"$schema" = "https://starship.rs/config-schema.json"

add_newline = true

format = "$all$username$time$character"

[memory_usage]
format = "[у°Қӣ ${ram}]($style) "
disabled = false
threshold = -1
symbol = "у°Қӣ "
style = "bold #277767"

[time]
format = "[$time]($style) "
time_format = "%T"
style = "bold #3c8bb9"
disabled = false

[username]
format = "[п‘„](#a37f4a) [$user]($style) "
disabled = false
show_always = true
style_user = "#68844b bold"
style_root = "#c4485f bold"

[character]
success_symbol = "[п„  ](bold #68844b)"
error_symbol = "[п„  ](bold #c4485f)"
vimcmd_replace_one_symbol = "[п„  ](bold #cb733e)"
vimcmd_replace_symbol = "[п„  ](bold #cb733e)"
vimcmd_symbol = "[п„  ](bold dimmed #68844b)"
vimcmd_visual_symbol = "[п„  ](bold dimmed #68844b)"

[directory]
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "пҖ• вҖҰ/"
home_symbol = "пҖ• "
style = "bold #7f6aa5"
read_only_style = "bold #c4485f"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = "пҗҳ "
style = "bold #a37f4a"

[git_commit]
format = '[пҗ— $hash$tag]($style) '
commit_hash_length = 7
style = "bold #8d69d4"

[git_status]
format = '([п‘„](#a37f4a) [$all_status$ahead_behind]($style)[п‘„](#a37f4a) )'
ahead = "пҒў "
behind = "пҒЈ "
diverged = "пҒ№ "
untracked = "п„Ё "
stashed = "пҒ© "
modified = "пҒҖ "
staged = "пҒҶ "
conflicted = "пҒұ "

[hostname]
ssh_only = true
style = "bold dimmed #68844b"

[jobs]
symbol = "вңҰ "
style = "bold #4971c5"

[line_break]
disabled = false

[cmd_duration]
format = '[$duration]($style)'
min_time = 500
show_milliseconds = true
style = "bold #c4485f"

