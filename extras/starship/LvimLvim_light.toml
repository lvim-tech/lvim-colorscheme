"$schema" = "https://starship.rs/config-schema.json"

add_newline = true

format = "$all$username$time$character"

[memory_usage]
format = "[у°Қӣ ${ram}]($style) "
disabled = false
threshold = -1
symbol = "у°Қӣ "
style = "bold #2a9b86"

[time]
format = "[$time]($style) "
time_format = "%T"
style = "bold #018ca3"
disabled = false

[username]
format = "[п‘„](#876826) [$user]($style) "
disabled = false
show_always = true
style_user = "#556738 bold"
style_root = "#c53f30 bold"

[character]
success_symbol = "[п„  ](bold #556738)"
error_symbol = "[п„  ](bold #c53f30)"
vimcmd_replace_one_symbol = "[п„  ](bold #b66400)"
vimcmd_replace_symbol = "[п„  ](bold #b66400)"
vimcmd_symbol = "[п„  ](bold dimmed #556738)"
vimcmd_visual_symbol = "[п„  ](bold dimmed #556738)"

[directory]
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "пҖ• вҖҰ/"
home_symbol = "пҖ• "
style = "bold #1f91d1"
read_only_style = "bold #c53f30"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = "пҗҳ "
style = "bold #876826"

[git_commit]
format = '[пҗ— $hash$tag]($style) '
commit_hash_length = 7
style = "bold #d15a3f"

[git_status]
format = '([п‘„](#876826) [$all_status$ahead_behind]($style)[п‘„](#876826) )'
ahead = "пҒў "
behind = "пҒЈ "
diverged = "пҒ№ "
untracked = "п„Ё "
stashed = "пҒ© "
modified = "пҒҖ "
staged = "пҒҶ "
conflicted = "пҒұ "

[hostname]
ssh_only = true
style = "bold dimmed #556738"

[jobs]
symbol = "вңҰ "
style = "bold #0d8abf"

[line_break]
disabled = false

[cmd_duration]
format = '[$duration]($style)'
min_time = 500
show_milliseconds = true
style = "bold #c53f30"

