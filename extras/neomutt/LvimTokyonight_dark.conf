# LvimTokyonight_dark colors for Neomutt

# Basic Colors
color normal          #b2b6c7             default         # normal text
color indicator       default           #1c1d29      # selected item
color tree            #48a4d9      default         # thread arrows
color status          #4e78d1      default         # status line
color error           #d14d66       default         # error messages
color message         #8fb468     default         # info messages
color markers         #d87b43    default         # + at line wrapping
color attachment      #8359ce   default         # attachment info
color search          #bd9357    default         # search matches
color tilde           #63677c        default         # ~ empty lines

# Message Headers
color hdrdefault      #63677c        default         # default header
color header          #6589d7           default         '^From:'
color header          #8470a9    default         '^Subject:'
color header          #60b0de           default         '^User-Agent:.*Mutt'
color header          #48a4d9      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #9dbd7b          default         # quoted text
color quoted1         #4e78d1      default         # nested quote
color quoted2         #9381b3         default         # nested quote 2
color quoted3         #48a4d9      default         # nested quote 3
color quoted4         #bd9357    default         # nested quote 4
color quoted5         #9470d5        default         # nested quote 5
color signature       #63677c        default         # signature
color bold            #dd8b5a         default         # bold text
color underline       #d87b43    default         # underlined text

# Message Index
color index           #60b0de           default         ~Q  # replied messages
color index           #d14d66       default         ~D  # deleted messages
color index           #63677c        default         ~O  # old messages
color index           #4e78d1      default         ~P  # from me
color index           #bd9357    default         ~T  # tagged messages
color index           #dd8b5a         default         ~F  # flagged messages
color index           #8470a9    default         ~v  # collapsed thread
color index           #9470d5        default         ~k  # GPG
color index           #8fb468     default         ~N  # new messages
color index_author    #48a4d9      default         .*  # all authors

# Special Email Elements
color body            #4e78d1      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #48a4d9      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #c5a06b         default         "\\[[0-9]+\\]"
color body            #bd9357    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #d76479            default         ~D   # deleted
color index_flags     #48a4d9      default         ~g   # signed
color index_flags     #4e78d1      default         ~G   # encrypted
color index_author    #8fb468     default         ~P   # from me
color index_author    #d87b43    default         ~F   # flagged
color index_author    #d87b43    default         ~l   # mailing lists
color index_flags     #9dbd7b          default         ~N   # new
color index_flags     #d14d66       default         ~l   # lists
color index_date      #d76479            default              # date
color index_size      #4e78d1      default              # size
color index_number    #bd9357    default              # number

color indicator             default         #1c1d29
color sidebar_indicator     #d87b43  #1c1d29
color sidebar_highlight     default         #1c1d29
color sidebar_background    #b2b6c7           default
color sidebar_divider       #4e78d1    default
color sidebar_flagged       #4e78d1    default
color sidebar_new           #d76479          default
color sidebar_ordinary      #8fb468   default
color sidebar_spool_file    #c5a06b       default
color sidebar_unread        #d76479          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold