# LvimKanagawa_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #628680      default         # thread arrows
color status          #688bcb      default         # status line
color error           #d15e5e       default         # error messages
color message         #6d7f55     default         # info messages
color markers         #ab7b4b    default         # + at line wrapping
color attachment      #9b5652   default         # attachment info
color search          #7b6943    default         # search matches
color tilde           #9e9ea4        default         # ~ empty lines

# Message Headers
color hdrdefault      #9e9ea4        default         # default header
color header          #6386c4           default         '^From:'
color header          #867d9d    default         '^Subject:'
color header          #5d807a           default         '^User-Agent:.*Mutt'
color header          #628680      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #677951          default         # quoted text
color quoted1         #688bcb      default         # nested quote
color quoted2         #82789b         default         # nested quote 2
color quoted3         #628680      default         # nested quote 3
color quoted4         #7b6943    default         # nested quote 4
color quoted5         #92534e        default         # nested quote 5
color signature       #9e9ea4        default         # signature
color bold            #a5794e         default         # bold text
color underline       #ab7b4b    default         # underlined text

# Message Index
color index           #5d807a           default         ~Q  # replied messages
color index           #d15e5e       default         ~D  # deleted messages
color index           #9e9ea4        default         ~O  # old messages
color index           #688bcb      default         ~P  # from me
color index           #7b6943    default         ~T  # tagged messages
color index           #a5794e         default         ~F  # flagged messages
color index           #867d9d    default         ~v  # collapsed thread
color index           #92534e        default         ~k  # GPG
color index           #6d7f55     default         ~N  # new messages
color index_author    #628680      default         .*  # all authors

# Special Email Elements
color body            #688bcb      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #628680      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #776745         default         "\\[[0-9]+\\]"
color body            #7b6943    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #c85b5b            default         ~D   # deleted
color index_flags     #628680      default         ~g   # signed
color index_flags     #688bcb      default         ~G   # encrypted
color index_author    #6d7f55     default         ~P   # from me
color index_author    #ab7b4b    default         ~F   # flagged
color index_author    #ab7b4b    default         ~l   # mailing lists
color index_flags     #677951          default         ~N   # new
color index_flags     #d15e5e       default         ~l   # lists
color index_date      #c85b5b            default              # date
color index_size      #688bcb      default              # size
color index_number    #7b6943    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #ab7b4b  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #688bcb    default
color sidebar_flagged       #688bcb    default
color sidebar_new           #c85b5b          default
color sidebar_ordinary      #6d7f55   default
color sidebar_spool_file    #776745       default
color sidebar_unread        #c85b5b          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold