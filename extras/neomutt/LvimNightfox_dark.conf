# LvimNightfox_dark colors for Neomutt

# Basic Colors
color normal          #bcbdbd             default         # normal text
color indicator       default           #1b2533      # selected item
color tree            #62b2b4      default         # thread arrows
color status          #5f84b4      default         # status line
color error           #ac5369       default         # error messages
color message         #799e8c     default         # info messages
color markers         #ce844a    default         # + at line wrapping
color attachment      #8e71a4   default         # attachment info
color search          #b9a15e    default         # search matches
color tilde           #7b8189        default         # ~ empty lines

# Message Headers
color hdrdefault      #7b8189        default         # default header
color header          #7292bd           default         '^From:'
color header          #846fa8    default         '^Subject:'
color header          #75bbbd           default         '^User-Agent:.*Mutt'
color header          #62b2b4      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #89aa9a          default         # quoted text
color quoted1         #5f84b4      default         # nested quote
color quoted2         #9380b2         default         # nested quote 2
color quoted3         #62b2b4      default         # nested quote 3
color quoted4         #b9a15e    default         # nested quote 4
color quoted5         #9b82af        default         # nested quote 5
color signature       #7b8189        default         # signature
color bold            #d49360         default         # bold text
color underline       #ce844a    default         # underlined text

# Message Index
color index           #75bbbd           default         ~Q  # replied messages
color index           #ac5369       default         ~D  # deleted messages
color index           #7b8189        default         ~O  # old messages
color index           #5f84b4      default         ~P  # from me
color index           #b9a15e    default         ~T  # tagged messages
color index           #d49360         default         ~F  # flagged messages
color index           #846fa8    default         ~v  # collapsed thread
color index           #9b82af        default         ~k  # GPG
color index           #799e8c     default         ~N  # new messages
color index_author    #62b2b4      default         .*  # all authors

# Special Email Elements
color body            #5f84b4      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #62b2b4      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #c1ac71         default         "\\[[0-9]+\\]"
color body            #b9a15e    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #b46478            default         ~D   # deleted
color index_flags     #62b2b4      default         ~g   # signed
color index_flags     #5f84b4      default         ~G   # encrypted
color index_author    #799e8c     default         ~P   # from me
color index_author    #ce844a    default         ~F   # flagged
color index_author    #ce844a    default         ~l   # mailing lists
color index_flags     #89aa9a          default         ~N   # new
color index_flags     #ac5369       default         ~l   # lists
color index_date      #b46478            default              # date
color index_size      #5f84b4      default              # size
color index_number    #b9a15e    default              # number

color indicator             default         #1b2533
color sidebar_indicator     #ce844a  #1b2533
color sidebar_highlight     default         #1b2533
color sidebar_background    #bcbdbd           default
color sidebar_divider       #5f84b4    default
color sidebar_flagged       #5f84b4    default
color sidebar_new           #b46478          default
color sidebar_ordinary      #799e8c   default
color sidebar_spool_file    #c1ac71       default
color sidebar_unread        #b46478          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold