# LvimNord_soft colors for Neomutt

# Basic Colors
color normal          #b3bac6             default         # normal text
color indicator       default           #2a2f3a      # selected item
color tree            #6c9ead      default         # thread arrows
color status          #6f89a4      default         # status line
color error           #a66067       default         # error messages
color message         #89a076     default         # info messages
color markers         #b17562    default         # + at line wrapping
color attachment      #997b93   default         # attachment info
color search          #c3a25d    default         # search matches
color tilde           #6b717e        default         # ~ empty lines

# Message Headers
color hdrdefault      #6b717e        default         # default header
color header          #8097af           default         '^From:'
color header          #8d8497    default         '^Subject:'
color header          #7eaab7           default         '^User-Agent:.*Mutt'
color header          #6c9ead      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #97ab86          default         # quoted text
color quoted1         #6f89a4      default         # nested quote
color quoted2         #9b93a4         default         # nested quote 2
color quoted3         #6c9ead      default         # nested quote 3
color quoted4         #c3a25d    default         # nested quote 4
color quoted5         #a58aa0        default         # nested quote 5
color signature       #6b717e        default         # signature
color bold            #ba8574         default         # bold text
color underline       #b17562    default         # underlined text

# Message Index
color index           #7eaab7           default         ~Q  # replied messages
color index           #a66067       default         ~D  # deleted messages
color index           #6b717e        default         ~O  # old messages
color index           #6f89a4      default         ~P  # from me
color index           #c3a25d    default         ~T  # tagged messages
color index           #ba8574         default         ~F  # flagged messages
color index           #8d8497    default         ~v  # collapsed thread
color index           #a58aa0        default         ~k  # GPG
color index           #89a076     default         ~N  # new messages
color index_author    #6c9ead      default         .*  # all authors

# Special Email Elements
color body            #6f89a4      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #6c9ead      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #cbae72         default         "\\[[0-9]+\\]"
color body            #c3a25d    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #af7177            default         ~D   # deleted
color index_flags     #6c9ead      default         ~g   # signed
color index_flags     #6f89a4      default         ~G   # encrypted
color index_author    #89a076     default         ~P   # from me
color index_author    #b17562    default         ~F   # flagged
color index_author    #b17562    default         ~l   # mailing lists
color index_flags     #97ab86          default         ~N   # new
color index_flags     #a66067       default         ~l   # lists
color index_date      #af7177            default              # date
color index_size      #6f89a4      default              # size
color index_number    #c3a25d    default              # number

color indicator             default         #2a2f3a
color sidebar_indicator     #b17562  #2a2f3a
color sidebar_highlight     default         #2a2f3a
color sidebar_background    #b3bac6           default
color sidebar_divider       #6f89a4    default
color sidebar_flagged       #6f89a4    default
color sidebar_new           #af7177          default
color sidebar_ordinary      #89a076   default
color sidebar_spool_file    #cbae72       default
color sidebar_unread        #af7177          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold