# LvimGruvbox_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #67976d      default         # thread arrows
color status          #5b97b6      default         # status line
color error           #e44a4a       default         # error messages
color message         #8a8e46     default         # info messages
color markers         #a05e33    default         # + at line wrapping
color attachment      #a96047   default         # attachment info
color search          #998853    default         # search matches
color tilde           #a49284        default         # ~ empty lines

# Message Headers
color hdrdefault      #a49284        default         # default header
color header          #5089a6           default         '^From:'
color header          #9f9aa9    default         '^Subject:'
color header          #5c8861           default         '^User-Agent:.*Mutt'
color header          #67976d      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #7b7e3d          default         # quoted text
color quoted1         #5b97b6      default         # nested quote
color quoted2         #918c9d         default         # nested quote 2
color quoted3         #67976d      default         # nested quote 3
color quoted4         #998853    default         # nested quote 4
color quoted5         #915a47        default         # nested quote 5
color signature       #a49284        default         # signature
color bold            #8d522b         default         # bold text
color underline       #a05e33    default         # underlined text

# Message Index
color index           #5c8861           default         ~Q  # replied messages
color index           #e44a4a       default         ~D  # deleted messages
color index           #a49284        default         ~O  # old messages
color index           #5b97b6      default         ~P  # from me
color index           #998853    default         ~T  # tagged messages
color index           #8d522b         default         ~F  # flagged messages
color index           #9f9aa9    default         ~v  # collapsed thread
color index           #915a47        default         ~k  # GPG
color index           #8a8e46     default         ~N  # new messages
color index_author    #67976d      default         .*  # all authors

# Special Email Elements
color body            #5b97b6      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #67976d      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #8f8156         default         "\\[[0-9]+\\]"
color body            #998853    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #c74d4d            default         ~D   # deleted
color index_flags     #67976d      default         ~g   # signed
color index_flags     #5b97b6      default         ~G   # encrypted
color index_author    #8a8e46     default         ~P   # from me
color index_author    #a05e33    default         ~F   # flagged
color index_author    #a05e33    default         ~l   # mailing lists
color index_flags     #7b7e3d          default         ~N   # new
color index_flags     #e44a4a       default         ~l   # lists
color index_date      #c74d4d            default              # date
color index_size      #5b97b6      default              # size
color index_number    #998853    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #a05e33  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #5b97b6    default
color sidebar_flagged       #5b97b6    default
color sidebar_new           #c74d4d          default
color sidebar_ordinary      #8a8e46   default
color sidebar_spool_file    #8f8156       default
color sidebar_unread        #c74d4d          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold