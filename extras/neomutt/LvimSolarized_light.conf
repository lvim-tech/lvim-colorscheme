# LvimSolarized_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #3a8580      default         # thread arrows
color status          #407fac      default         # status line
color error           #dc5d5b       default         # error messages
color message         #7a881e     default         # info messages
color markers         #d26d43    default         # + at line wrapping
color attachment      #d25a94   default         # attachment info
color search          #967a20    default         # search matches
color tilde           #7b888e        default         # ~ empty lines

# Message Headers
color hdrdefault      #7b888e        default         # default header
color header          #39739c           default         '^From:'
color header          #717395    default         '^Subject:'
color header          #347873           default         '^User-Agent:.*Mutt'
color header          #3a8580      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #707c19          default         # quoted text
color quoted1         #407fac      default         # nested quote
color quoted2         #626587         default         # nested quote 2
color quoted3         #3a8580      default         # nested quote 3
color quoted4         #967a20    default         # nested quote 4
color quoted5         #bd5588        default         # nested quote 5
color signature       #7b888e        default         # signature
color bold            #c3643d         default         # bold text
color underline       #d26d43    default         # underlined text

# Message Index
color index           #347873           default         ~Q  # replied messages
color index           #dc5d5b       default         ~D  # deleted messages
color index           #7b888e        default         ~O  # old messages
color index           #407fac      default         ~P  # from me
color index           #967a20    default         ~T  # tagged messages
color index           #c3643d         default         ~F  # flagged messages
color index           #717395    default         ~v  # collapsed thread
color index           #bd5588        default         ~k  # GPG
color index           #7a881e     default         ~N  # new messages
color index_author    #3a8580      default         .*  # all authors

# Special Email Elements
color body            #407fac      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #3a8580      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #896f1c         default         "\\[[0-9]+\\]"
color body            #967a20    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #cc5452            default         ~D   # deleted
color index_flags     #3a8580      default         ~g   # signed
color index_flags     #407fac      default         ~G   # encrypted
color index_author    #7a881e     default         ~P   # from me
color index_author    #d26d43    default         ~F   # flagged
color index_author    #d26d43    default         ~l   # mailing lists
color index_flags     #707c19          default         ~N   # new
color index_flags     #dc5d5b       default         ~l   # lists
color index_date      #cc5452            default              # date
color index_size      #407fac      default              # size
color index_number    #967a20    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #d26d43  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #407fac    default
color sidebar_flagged       #407fac    default
color sidebar_new           #cc5452          default
color sidebar_ordinary      #7a881e   default
color sidebar_spool_file    #896f1c       default
color sidebar_unread        #cc5452          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold