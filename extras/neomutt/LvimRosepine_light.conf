# LvimRosepine_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #5c8991      default         # thread arrows
color status          #5e99b2      default         # status line
color error           #bb4f6d       default         # error messages
color message         #5c8991     default         # info messages
color markers         #945654    default         # + at line wrapping
color attachment      #875fb4   default         # attachment info
color search          #a1763b    default         # search matches
color tilde           #7c7a87        default         # ~ empty lines

# Message Headers
color hdrdefault      #7c7a87        default         # default header
color header          #578fa6           default         '^From:'
color header          #6f6787    default         '^Subject:'
color header          #5d8086           default         '^User-Agent:.*Mutt'
color header          #5c8991      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #5d8086          default         # quoted text
color quoted1         #5e99b2      default         # nested quote
color quoted2         #8d87a0         default         # nested quote 2
color quoted3         #5c8991      default         # nested quote 3
color quoted4         #a1763b    default         # nested quote 4
color quoted5         #75509c        default         # nested quote 5
color signature       #7c7a87        default         # signature
color bold            #c0716d         default         # bold text
color underline       #945654    default         # underlined text

# Message Index
color index           #5d8086           default         ~Q  # replied messages
color index           #bb4f6d       default         ~D  # deleted messages
color index           #7c7a87        default         ~O  # old messages
color index           #5e99b2      default         ~P  # from me
color index           #a1763b    default         ~T  # tagged messages
color index           #c0716d         default         ~F  # flagged messages
color index           #6f6787    default         ~v  # collapsed thread
color index           #75509c        default         ~k  # GPG
color index           #5c8991     default         ~N  # new messages
color index_author    #5c8991      default         .*  # all authors

# Special Email Elements
color body            #5e99b2      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #5c8991      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #927143         default         "\\[[0-9]+\\]"
color body            #a1763b    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #a04a63            default         ~D   # deleted
color index_flags     #5c8991      default         ~g   # signed
color index_flags     #5e99b2      default         ~G   # encrypted
color index_author    #5c8991     default         ~P   # from me
color index_author    #945654    default         ~F   # flagged
color index_author    #945654    default         ~l   # mailing lists
color index_flags     #5d8086          default         ~N   # new
color index_flags     #bb4f6d       default         ~l   # lists
color index_date      #a04a63            default              # date
color index_size      #5e99b2      default              # size
color index_number    #a1763b    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #945654  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #5e99b2    default
color sidebar_flagged       #5e99b2    default
color sidebar_new           #a04a63          default
color sidebar_ordinary      #5c8991   default
color sidebar_spool_file    #927143       default
color sidebar_unread        #a04a63          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold