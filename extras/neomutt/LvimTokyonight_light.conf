# LvimTokyonight_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #3c8bb9      default         # thread arrows
color status          #4971c5      default         # status line
color error           #c4485f       default         # error messages
color message         #68844b     default         # info messages
color markers         #cb733e    default         # + at line wrapping
color attachment      #8d69d4   default         # attachment info
color search          #a37f4a    default         # search matches
color tilde           #82859a        default         # ~ empty lines

# Message Headers
color hdrdefault      #82859a        default         # default header
color header          #4363a3           default         '^From:'
color header          #7f6aa5    default         '^Subject:'
color header          #4682a5           default         '^User-Agent:.*Mutt'
color header          #3c8bb9      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #667b4f          default         # quoted text
color quoted1         #4971c5      default         # nested quote
color quoted2         #715a95         default         # nested quote 2
color quoted3         #3c8bb9      default         # nested quote 3
color quoted4         #a37f4a    default         # nested quote 4
color quoted5         #8051c9        default         # nested quote 5
color signature       #82859a        default         # signature
color bold            #b57148         default         # bold text
color underline       #cb733e    default         # underlined text

# Message Index
color index           #4682a5           default         ~Q  # replied messages
color index           #c4485f       default         ~D  # deleted messages
color index           #82859a        default         ~O  # old messages
color index           #4971c5      default         ~P  # from me
color index           #a37f4a    default         ~T  # tagged messages
color index           #b57148         default         ~F  # flagged messages
color index           #7f6aa5    default         ~v  # collapsed thread
color index           #8051c9        default         ~k  # GPG
color index           #68844b     default         ~N  # new messages
color index_author    #3c8bb9      default         .*  # all authors

# Special Email Elements
color body            #4971c5      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #3c8bb9      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #95784f         default         "\\[[0-9]+\\]"
color body            #a37f4a    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #a94357            default         ~D   # deleted
color index_flags     #3c8bb9      default         ~g   # signed
color index_flags     #4971c5      default         ~G   # encrypted
color index_author    #68844b     default         ~P   # from me
color index_author    #cb733e    default         ~F   # flagged
color index_author    #cb733e    default         ~l   # mailing lists
color index_flags     #667b4f          default         ~N   # new
color index_flags     #c4485f       default         ~l   # lists
color index_date      #a94357            default              # date
color index_size      #4971c5      default              # size
color index_number    #a37f4a    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #cb733e  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #4971c5    default
color sidebar_flagged       #4971c5    default
color sidebar_new           #a94357          default
color sidebar_ordinary      #68844b   default
color sidebar_spool_file    #95784f       default
color sidebar_unread        #a94357          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold