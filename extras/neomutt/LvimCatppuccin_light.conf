# LvimCatppuccin_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #428591      default         # thread arrows
color status          #416cb1      default         # status line
color error           #b54c69       default         # error messages
color message         #52884d     default         # info messages
color markers         #bf7546    default         # + at line wrapping
color attachment      #934b7f   default         # attachment info
color search          #8b723a    default         # search matches
color tilde           #777984        default         # ~ empty lines

# Message Headers
color hdrdefault      #777984        default         # default header
color header          #5d8bd3           default         '^From:'
color header          #855db2    default         '^Subject:'
color header          #487d86           default         '^User-Agent:.*Mutt'
color header          #428591      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #557f51          default         # quoted text
color quoted1         #416cb1      default         # nested quote
color quoted2         #734e98         default         # nested quote 2
color quoted3         #428591      default         # nested quote 3
color quoted4         #8b723a    default         # nested quote 4
color quoted5         #c065a9        default         # nested quote 5
color signature       #777984        default         # signature
color bold            #aa724e         default         # bold text
color underline       #bf7546    default         # underlined text

# Message Index
color index           #487d86           default         ~Q  # replied messages
color index           #b54c69       default         ~D  # deleted messages
color index           #777984        default         ~O  # old messages
color index           #416cb1      default         ~P  # from me
color index           #8b723a    default         ~T  # tagged messages
color index           #aa724e         default         ~F  # flagged messages
color index           #855db2    default         ~v  # collapsed thread
color index           #c065a9        default         ~k  # GPG
color index           #52884d     default         ~N  # new messages
color index_author    #428591      default         .*  # all authors

# Special Email Elements
color body            #416cb1      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #428591      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #7f6c41         default         "\\[[0-9]+\\]"
color body            #8b723a    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #9d445e            default         ~D   # deleted
color index_flags     #428591      default         ~g   # signed
color index_flags     #416cb1      default         ~G   # encrypted
color index_author    #52884d     default         ~P   # from me
color index_author    #bf7546    default         ~F   # flagged
color index_author    #bf7546    default         ~l   # mailing lists
color index_flags     #557f51          default         ~N   # new
color index_flags     #b54c69       default         ~l   # lists
color index_date      #9d445e            default              # date
color index_size      #416cb1      default              # size
color index_number    #8b723a    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #bf7546  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #416cb1    default
color sidebar_flagged       #416cb1    default
color sidebar_new           #9d445e          default
color sidebar_ordinary      #52884d   default
color sidebar_spool_file    #7f6c41       default
color sidebar_unread        #9d445e          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold