# LvimNightfox_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #498789      default         # thread arrows
color status          #4f6e97      default         # status line
color error           #c35f78       default         # error messages
color message         #6d8f7f     default         # info messages
color markers         #bc7843    default         # + at line wrapping
color attachment      #846699   default         # attachment info
color search          #907d48    default         # search matches
color tilde           #696e75        default         # ~ empty lines

# Message Headers
color hdrdefault      #696e75        default         # default header
color header          #4a607e           default         '^From:'
color header          #806ba5    default         '^Subject:'
color header          #4e7f80           default         '^User-Agent:.*Mutt'
color header          #498789      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #6b8578          default         # quoted text
color quoted1         #4f6e97      default         # nested quote
color quoted2         #725b95         default         # nested quote 2
color quoted3         #498789      default         # nested quote 3
color quoted4         #907d48    default         # nested quote 4
color quoted5         #725986        default         # nested quote 5
color signature       #696e75        default         # signature
color bold            #a9754b         default         # bold text
color underline       #bc7843    default         # underlined text

# Message Index
color index           #4e7f80           default         ~Q  # replied messages
color index           #c35f78       default         ~D  # deleted messages
color index           #696e75        default         ~O  # old messages
color index           #4f6e97      default         ~P  # from me
color index           #907d48    default         ~T  # tagged messages
color index           #a9754b         default         ~F  # flagged messages
color index           #806ba5    default         ~v  # collapsed thread
color index           #725986        default         ~k  # GPG
color index           #6d8f7f     default         ~N  # new messages
color index_author    #498789      default         .*  # all authors

# Special Email Elements
color body            #4f6e97      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #498789      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #86774d         default         "\\[[0-9]+\\]"
color body            #907d48    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #a65c6e            default         ~D   # deleted
color index_flags     #498789      default         ~g   # signed
color index_flags     #4f6e97      default         ~G   # encrypted
color index_author    #6d8f7f     default         ~P   # from me
color index_author    #bc7843    default         ~F   # flagged
color index_author    #bc7843    default         ~l   # mailing lists
color index_flags     #6b8578          default         ~N   # new
color index_flags     #c35f78       default         ~l   # lists
color index_date      #a65c6e            default              # date
color index_size      #4f6e97      default              # size
color index_number    #907d48    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #bc7843  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #4f6e97    default
color sidebar_flagged       #4f6e97    default
color sidebar_new           #a65c6e          default
color sidebar_ordinary      #6d8f7f   default
color sidebar_spool_file    #86774d       default
color sidebar_unread        #a65c6e          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold