# LvimSolarized_darker colors for Neomutt

# Basic Colors
color normal          #9da4a4             default         # normal text
color indicator       default           #01222b      # selected item
color tree            #38807b      default         # thread arrows
color status          #3d7aa5      default         # status line
color error           #b34240       default         # error messages
color message         #687418     default         # info messages
color markers         #9d5030    default         # + at line wrapping
color attachment      #aa4777   default         # attachment info
color search          #886e1c    default         # search matches
color tilde           #5f6a6e        default         # ~ empty lines

# Message Headers
color hdrdefault      #5f6a6e        default         # default header
color header          #4386b5           default         '^From:'
color header          #747697    default         '^Subject:'
color header          #3e8d87           default         '^User-Agent:.*Mutt'
color header          #38807b      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #727f1a          default         # quoted text
color quoted1         #3d7aa5      default         # nested quote
color quoted2         #8385a2         default         # nested quote 2
color quoted3         #38807b      default         # nested quote 3
color quoted4         #886e1c    default         # nested quote 4
color quoted5         #b75283        default         # nested quote 5
color signature       #5f6a6e        default         # signature
color bold            #ac5835         default         # bold text
color underline       #9d5030    default         # underlined text

# Message Index
color index           #3e8d87           default         ~Q  # replied messages
color index           #b34240       default         ~D  # deleted messages
color index           #5f6a6e        default         ~O  # old messages
color index           #3d7aa5      default         ~P  # from me
color index           #886e1c    default         ~T  # tagged messages
color index           #ac5835         default         ~F  # flagged messages
color index           #747697    default         ~v  # collapsed thread
color index           #b75283        default         ~k  # GPG
color index           #687418     default         ~N  # new messages
color index_author    #38807b      default         .*  # all authors

# Special Email Elements
color body            #3d7aa5      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #38807b      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #96791f         default         "\\[[0-9]+\\]"
color body            #886e1c    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #bf4e4c            default         ~D   # deleted
color index_flags     #38807b      default         ~g   # signed
color index_flags     #3d7aa5      default         ~G   # encrypted
color index_author    #687418     default         ~P   # from me
color index_author    #9d5030    default         ~F   # flagged
color index_author    #9d5030    default         ~l   # mailing lists
color index_flags     #727f1a          default         ~N   # new
color index_flags     #b34240       default         ~l   # lists
color index_date      #bf4e4c            default              # date
color index_size      #3d7aa5      default              # size
color index_number    #886e1c    default              # number

color indicator             default         #01222b
color sidebar_indicator     #9d5030  #01222b
color sidebar_highlight     default         #01222b
color sidebar_background    #9da4a4           default
color sidebar_divider       #3d7aa5    default
color sidebar_flagged       #3d7aa5    default
color sidebar_new           #bf4e4c          default
color sidebar_ordinary      #687418   default
color sidebar_spool_file    #96791f       default
color sidebar_unread        #bf4e4c          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold