# LvimCatppuccin_dark colors for Neomutt

# Basic Colors
color normal          #b2b7c7             default         # normal text
color indicator       default           #202030      # selected item
color tree            #5cb4c4      default         # thread arrows
color status          #5082d4      default         # status line
color error           #cc5777       default         # error messages
color message         #71b96b     default         # info messages
color markers         #d4834f    default         # + at line wrapping
color attachment      #c869ae   default         # attachment info
color search          #d2ad5c    default         # search matches
color tilde           #72747f        default         # ~ empty lines

# Message Headers
color hdrdefault      #72747f        default         # default header
color header          #6793da           default         '^From:'
color header          #926fbc    default         '^Subject:'
color header          #71becc           default         '^User-Agent:.*Mutt'
color header          #5cb4c4      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #84c27f          default         # quoted text
color quoted1         #5082d4      default         # nested quote
color quoted2         #a183c5         default         # nested quote 2
color quoted3         #5cb4c4      default         # nested quote 3
color quoted4         #d2ad5c    default         # nested quote 4
color quoted5         #d07fba        default         # nested quote 5
color signature       #72747f        default         # signature
color bold            #da9366         default         # bold text
color underline       #d4834f    default         # underlined text

# Message Index
color index           #71becc           default         ~Q  # replied messages
color index           #cc5777       default         ~D  # deleted messages
color index           #72747f        default         ~O  # old messages
color index           #5082d4      default         ~P  # from me
color index           #d2ad5c    default         ~T  # tagged messages
color index           #da9366         default         ~F  # flagged messages
color index           #926fbc    default         ~v  # collapsed thread
color index           #d07fba        default         ~k  # GPG
color index           #71b96b     default         ~N  # new messages
color index_author    #5cb4c4      default         .*  # all authors

# Special Email Elements
color body            #5082d4      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #5cb4c4      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #d8b973         default         "\\[[0-9]+\\]"
color body            #d2ad5c    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #d36d89            default         ~D   # deleted
color index_flags     #5cb4c4      default         ~g   # signed
color index_flags     #5082d4      default         ~G   # encrypted
color index_author    #71b96b     default         ~P   # from me
color index_author    #d4834f    default         ~F   # flagged
color index_author    #d4834f    default         ~l   # mailing lists
color index_flags     #84c27f          default         ~N   # new
color index_flags     #cc5777       default         ~l   # lists
color index_date      #d36d89            default              # date
color index_size      #5082d4      default              # size
color index_number    #d2ad5c    default              # number

color indicator             default         #202030
color sidebar_indicator     #d4834f  #202030
color sidebar_highlight     default         #202030
color sidebar_background    #b2b7c7           default
color sidebar_divider       #5082d4    default
color sidebar_flagged       #5082d4    default
color sidebar_new           #d36d89          default
color sidebar_ordinary      #71b96b   default
color sidebar_spool_file    #d8b973       default
color sidebar_unread        #d36d89          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold