# LvimMaterial_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #3786a5      default         # thread arrows
color status          #436fcb      default         # status line
color error           #c34e54       default         # error messages
color message         #617c3b     default         # info messages
color markers         #a25038    default         # + at line wrapping
color attachment      #d14158   default         # attachment info
color search          #97722c    default         # search matches
color tilde           #7a8990        default         # ~ empty lines

# Message Headers
color hdrdefault      #7a8990        default         # default header
color header          #3c62a8           default         '^From:'
color header          #7f6494    default         '^Subject:'
color header          #407e97           default         '^User-Agent:.*Mutt'
color header          #3786a5      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #5f7541          default         # quoted text
color quoted1         #436fcb      default         # nested quote
color quoted2         #6f567f         default         # nested quote 2
color quoted3         #3786a5      default         # nested quote 3
color quoted4         #97722c    default         # nested quote 4
color quoted5         #b44356        default         # nested quote 5
color signature       #7a8990        default         # signature
color bold            #c77259         default         # bold text
color underline       #a25038    default         # underlined text

# Message Index
color index           #407e97           default         ~Q  # replied messages
color index           #c34e54       default         ~D  # deleted messages
color index           #7a8990        default         ~O  # old messages
color index           #436fcb      default         ~P  # from me
color index           #97722c    default         ~T  # tagged messages
color index           #c77259         default         ~F  # flagged messages
color index           #7f6494    default         ~v  # collapsed thread
color index           #b44356        default         ~k  # GPG
color index           #617c3b     default         ~N  # new messages
color index_author    #3786a5      default         .*  # all authors

# Special Email Elements
color body            #436fcb      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #3786a5      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #8b6d37         default         "\\[[0-9]+\\]"
color body            #97722c    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #a9484d            default         ~D   # deleted
color index_flags     #3786a5      default         ~g   # signed
color index_flags     #436fcb      default         ~G   # encrypted
color index_author    #617c3b     default         ~P   # from me
color index_author    #a25038    default         ~F   # flagged
color index_author    #a25038    default         ~l   # mailing lists
color index_flags     #5f7541          default         ~N   # new
color index_flags     #c34e54       default         ~l   # lists
color index_date      #a9484d            default              # date
color index_size      #436fcb      default              # size
color index_number    #97722c    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #a25038  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #436fcb    default
color sidebar_flagged       #436fcb    default
color sidebar_new           #a9484d          default
color sidebar_ordinary      #617c3b   default
color sidebar_spool_file    #8b6d37       default
color sidebar_unread        #a9484d          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold