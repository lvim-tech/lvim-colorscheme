# LvimNord_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #618e9c      default         # thread arrows
color status          #556a80      default         # status line
color error           #ae656c       default         # error messages
color message         #788c67     default         # info messages
color markers         #905e4f    default         # + at line wrapping
color attachment      #7c6377   default         # attachment info
color search          #937944    default         # search matches
color tilde           #777d8c        default         # ~ empty lines

# Message Headers
color hdrdefault      #777d8c        default         # default header
color header          #768ba1           default         '^From:'
color header          #6d6377    default         '^Subject:'
color header          #61848f           default         '^User-Agent:.*Mutt'
color header          #618e9c      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #738366          default         # quoted text
color quoted1         #556a80      default         # nested quote
color quoted2         #8d8497         default         # nested quote 2
color quoted3         #618e9c      default         # nested quote 3
color quoted4         #937944    default         # nested quote 4
color quoted5         #9e8299        default         # nested quote 5
color signature       #777d8c        default         # signature
color bold            #b27f6f         default         # bold text
color underline       #905e4f    default         # underlined text

# Message Index
color index           #61848f           default         ~Q  # replied messages
color index           #ae656c       default         ~D  # deleted messages
color index           #777d8c        default         ~O  # old messages
color index           #556a80      default         ~P  # from me
color index           #937944    default         ~T  # tagged messages
color index           #b27f6f         default         ~F  # flagged messages
color index           #6d6377    default         ~v  # collapsed thread
color index           #9e8299        default         ~k  # GPG
color index           #788c67     default         ~N  # new messages
color index_author    #618e9c      default         .*  # all authors

# Special Email Elements
color body            #556a80      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #618e9c      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #87734a         default         "\\[[0-9]+\\]"
color body            #937944    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #935d63            default         ~D   # deleted
color index_flags     #618e9c      default         ~g   # signed
color index_flags     #556a80      default         ~G   # encrypted
color index_author    #788c67     default         ~P   # from me
color index_author    #905e4f    default         ~F   # flagged
color index_author    #905e4f    default         ~l   # mailing lists
color index_flags     #738366          default         ~N   # new
color index_flags     #ae656c       default         ~l   # lists
color index_date      #935d63            default              # date
color index_size      #556a80      default              # size
color index_number    #937944    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #905e4f  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #556a80    default
color sidebar_flagged       #556a80    default
color sidebar_new           #935d63          default
color sidebar_ordinary      #788c67   default
color sidebar_spool_file    #87734a       default
color sidebar_unread        #935d63          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold