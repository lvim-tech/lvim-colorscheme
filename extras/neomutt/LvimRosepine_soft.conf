# LvimRosepine_soft colors for Neomutt

# Basic Colors
color normal          #b4b2c7             default         # normal text
color indicator       default           #211e2e      # selected item
color tree            #71a7b0      default         # thread arrows
color status          #3b6374      default         # status line
color error           #c65474       default         # error messages
color message         #71a7b0     default         # info messages
color markers         #bd7370    default         # + at line wrapping
color attachment      #906cbb   default         # attachment info
color search          #d09a4f    default         # search matches
color tilde           #73717f        default         # ~ empty lines

# Message Headers
color hdrdefault      #73717f        default         # default header
color header          #416d7f           default         '^From:'
color header          #867f9b    default         '^Subject:'
color header          #83b2ba           default         '^User-Agent:.*Mutt'
color header          #71a7b0      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #83b2ba          default         # quoted text
color quoted1         #3b6374      default         # nested quote
color quoted2         #958fa7         default         # nested quote 2
color quoted3         #71a7b0      default         # nested quote 3
color quoted4         #d09a4f    default         # nested quote 4
color quoted5         #9f80c4        default         # nested quote 5
color signature       #73717f        default         # signature
color bold            #c68784         default         # bold text
color underline       #bd7370    default         # underlined text

# Message Index
color index           #83b2ba           default         ~Q  # replied messages
color index           #c65474       default         ~D  # deleted messages
color index           #73717f        default         ~O  # old messages
color index           #3b6374      default         ~P  # from me
color index           #d09a4f    default         ~T  # tagged messages
color index           #c68784         default         ~F  # flagged messages
color index           #867f9b    default         ~v  # collapsed thread
color index           #9f80c4        default         ~k  # GPG
color index           #71a7b0     default         ~N  # new messages
color index_author    #71a7b0      default         .*  # all authors

# Special Email Elements
color body            #3b6374      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #71a7b0      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #d6a765         default         "\\[[0-9]+\\]"
color body            #d09a4f    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #cd6985            default         ~D   # deleted
color index_flags     #71a7b0      default         ~g   # signed
color index_flags     #3b6374      default         ~G   # encrypted
color index_author    #71a7b0     default         ~P   # from me
color index_author    #bd7370    default         ~F   # flagged
color index_author    #bd7370    default         ~l   # mailing lists
color index_flags     #83b2ba          default         ~N   # new
color index_flags     #c65474       default         ~l   # lists
color index_date      #cd6985            default              # date
color index_size      #3b6374      default              # size
color index_number    #d09a4f    default              # number

color indicator             default         #211e2e
color sidebar_indicator     #bd7370  #211e2e
color sidebar_highlight     default         #211e2e
color sidebar_background    #b4b2c7           default
color sidebar_divider       #3b6374    default
color sidebar_flagged       #3b6374    default
color sidebar_new           #cd6985          default
color sidebar_ordinary      #71a7b0   default
color sidebar_spool_file    #d6a765       default
color sidebar_unread        #cd6985          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold