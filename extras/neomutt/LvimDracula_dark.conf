# LvimDracula_dark colors for Neomutt

# Basic Colors
color normal          #c7c7b3             default         # normal text
color indicator       default           #262832      # selected item
color tree            #49dac2      default         # thread arrows
color status          #4dc0d8      default         # status line
color error           #d84040       default         # error messages
color message         #42d367     default         # info messages
color markers         #d99144    default         # + at line wrapping
color attachment      #d74a9b   default         # attachment info
color search          #c9d451    default         # search matches
color tilde           #737a94        default         # ~ empty lines

# Message Headers
color hdrdefault      #737a94        default         # default header
color header          #65c8dd           default         '^From:'
color header          #8d6cba    default         '^Subject:'
color header          #61dfca           default         '^User-Agent:.*Mutt'
color header          #49dac2      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #58d879          default         # quoted text
color quoted1         #4dc0d8      default         # nested quote
color quoted2         #9c80c3         default         # nested quote 2
color quoted3         #49dac2      default         # nested quote 3
color quoted4         #c9d451    default         # nested quote 4
color quoted5         #dc61a8        default         # nested quote 5
color signature       #737a94        default         # signature
color bold            #de9f5c         default         # bold text
color underline       #d99144    default         # underlined text

# Message Index
color index           #61dfca           default         ~Q  # replied messages
color index           #d84040       default         ~D  # deleted messages
color index           #737a94        default         ~O  # old messages
color index           #4dc0d8      default         ~P  # from me
color index           #c9d451    default         ~T  # tagged messages
color index           #de9f5c         default         ~F  # flagged messages
color index           #8d6cba    default         ~v  # collapsed thread
color index           #dc61a8        default         ~k  # GPG
color index           #42d367     default         ~N  # new messages
color index_author    #49dac2      default         .*  # all authors

# Special Email Elements
color body            #4dc0d8      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #49dac2      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #d0da68         default         "\\[[0-9]+\\]"
color body            #c9d451    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #dd5757            default         ~D   # deleted
color index_flags     #49dac2      default         ~g   # signed
color index_flags     #4dc0d8      default         ~G   # encrypted
color index_author    #42d367     default         ~P   # from me
color index_author    #d99144    default         ~F   # flagged
color index_author    #d99144    default         ~l   # mailing lists
color index_flags     #58d879          default         ~N   # new
color index_flags     #d84040       default         ~l   # lists
color index_date      #dd5757            default              # date
color index_size      #4dc0d8      default              # size
color index_number    #c9d451    default              # number

color indicator             default         #262832
color sidebar_indicator     #d99144  #262832
color sidebar_highlight     default         #262832
color sidebar_background    #c7c7b3           default
color sidebar_divider       #4dc0d8    default
color sidebar_flagged       #4dc0d8    default
color sidebar_new           #dd5757          default
color sidebar_ordinary      #42d367   default
color sidebar_spool_file    #d0da68       default
color sidebar_unread        #dd5757          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold