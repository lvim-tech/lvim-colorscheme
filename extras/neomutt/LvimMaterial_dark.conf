# LvimMaterial_dark colors for Neomutt

# Basic Colors
color normal          #b2c7c7             default         # normal text
color indicator       default           #242f34      # selected item
color tree            #4bb1da      default         # thread arrows
color status          #4978da      default         # status line
color error           #ca5157       default         # error messages
color message         #99c15f     default         # info messages
color markers         #d1694b    default         # + at line wrapping
color attachment      #d5425a   default         # attachment info
color search          #d9a544    default         # search matches
color tilde           #5e6a70        default         # ~ empty lines

# Message Headers
color hdrdefault      #5e6a70        default         # default header
color header          #618adf           default         '^From:'
color header          #9075a5    default         '^Subject:'
color header          #63bbdf           default         '^User-Agent:.*Mutt'
color header          #4bb1da      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #a6c974          default         # quoted text
color quoted1         #4978da      default         # nested quote
color quoted2         #9e86b0         default         # nested quote 2
color quoted3         #4bb1da      default         # nested quote 3
color quoted4         #d9a544    default         # nested quote 4
color quoted5         #da596e        default         # nested quote 5
color signature       #5e6a70        default         # signature
color bold            #d77c61         default         # bold text
color underline       #d1694b    default         # underlined text

# Message Index
color index           #63bbdf           default         ~Q  # replied messages
color index           #ca5157       default         ~D  # deleted messages
color index           #5e6a70        default         ~O  # old messages
color index           #4978da      default         ~P  # from me
color index           #d9a544    default         ~T  # tagged messages
color index           #d77c61         default         ~F  # flagged messages
color index           #9075a5    default         ~v  # collapsed thread
color index           #da596e        default         ~k  # GPG
color index           #99c15f     default         ~N  # new messages
color index_author    #4bb1da      default         .*  # all authors

# Special Email Elements
color body            #4978da      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #4bb1da      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #deb05c         default         "\\[[0-9]+\\]"
color body            #d9a544    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #d1676c            default         ~D   # deleted
color index_flags     #4bb1da      default         ~g   # signed
color index_flags     #4978da      default         ~G   # encrypted
color index_author    #99c15f     default         ~P   # from me
color index_author    #d1694b    default         ~F   # flagged
color index_author    #d1694b    default         ~l   # mailing lists
color index_flags     #a6c974          default         ~N   # new
color index_flags     #ca5157       default         ~l   # lists
color index_date      #d1676c            default              # date
color index_size      #4978da      default              # size
color index_number    #d9a544    default              # number

color indicator             default         #242f34
color sidebar_indicator     #d1694b  #242f34
color sidebar_highlight     default         #242f34
color sidebar_background    #b2c7c7           default
color sidebar_divider       #4978da    default
color sidebar_flagged       #4978da    default
color sidebar_new           #d1676c          default
color sidebar_ordinary      #99c15f   default
color sidebar_spool_file    #deb05c       default
color sidebar_unread        #d1676c          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold