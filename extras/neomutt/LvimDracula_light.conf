# LvimDracula_light colors for Neomutt

# Basic Colors
color normal          #5e8888             default         # normal text
color indicator       default           #e5e5e5      # selected item
color tree            #237568      default         # thread arrows
color status          #307f90      default         # status line
color error           #d63f3f       default         # error messages
color message         #25803c     default         # info messages
color markers         #ae7435    default         # + at line wrapping
color attachment      #b93e85   default         # attachment info
color search          #636924    default         # search matches
color tilde           #6c728b        default         # ~ empty lines

# Message Headers
color hdrdefault      #6c728b        default         # default header
color header          #3a7885           default         '^From:'
color header          #8562b4    default         '^Subject:'
color header          #2d7065           default         '^User-Agent:.*Mutt'
color header          #237568      default         '^User-Agent: Mozilla/5.0.*Linux'

# Message Body
color quoted          #2f7a42          default         # quoted text
color quoted1         #307f90      default         # nested quote
color quoted2         #75519f         default         # nested quote 2
color quoted3         #237568      default         # nested quote 3
color quoted4         #636924    default         # nested quote 4
color quoted5         #9f3d77        default         # nested quote 5
color signature       #6c728b        default         # signature
color bold            #9e703f         default         # bold text
color underline       #ae7435    default         # underlined text

# Message Index
color index           #2d7065           default         ~Q  # replied messages
color index           #d63f3f       default         ~D  # deleted messages
color index           #6c728b        default         ~O  # old messages
color index           #307f90      default         ~P  # from me
color index           #636924    default         ~T  # tagged messages
color index           #9e703f         default         ~F  # flagged messages
color index           #8562b4    default         ~v  # collapsed thread
color index           #9f3d77        default         ~k  # GPG
color index           #25803c     default         ~N  # new messages
color index_author    #237568      default         .*  # all authors

# Special Email Elements
color body            #307f90      default         "[-a-z_0-9.+]+@[-a-z_0-9.]+"
color body            #237568      default         "((ftp|http|https)://|news:)[^ >)\"\t]+"
color body            #60652c         default         "\\[[0-9]+\\]"
color body            #636924    default         "\\[\\.\\.\\.?\\]"

# Index Flags and Metadata
color index_flags     #ba4040            default         ~D   # deleted
color index_flags     #237568      default         ~g   # signed
color index_flags     #307f90      default         ~G   # encrypted
color index_author    #25803c     default         ~P   # from me
color index_author    #ae7435    default         ~F   # flagged
color index_author    #ae7435    default         ~l   # mailing lists
color index_flags     #2f7a42          default         ~N   # new
color index_flags     #d63f3f       default         ~l   # lists
color index_date      #ba4040            default              # date
color index_size      #307f90      default              # size
color index_number    #636924    default              # number

color indicator             default         #e5e5e5
color sidebar_indicator     #ae7435  #e5e5e5
color sidebar_highlight     default         #e5e5e5
color sidebar_background    #5e8888           default
color sidebar_divider       #307f90    default
color sidebar_flagged       #307f90    default
color sidebar_new           #ba4040          default
color sidebar_ordinary      #25803c   default
color sidebar_spool_file    #60652c       default
color sidebar_unread        #ba4040          default


# Mono Settings
mono bold             bold
mono underline        underline
mono indicator        reverse
mono error            bold